{{ define "main" }}
<div class="home-spacer" aria-hidden="true"></div>
<section class="home-grid">
  <div class="home-slideshow" aria-label="Imágenes de la parroquia">
    <img class="home-slide is-active" src="/images/home/church-exterior.jpeg" alt="Exterior de la Parroquia San Pablo de la Cruz">
    <img class="home-slide" src="/images/home/church-slide-2.jpeg" alt="">
    <img class="home-slide" src="/images/home/church-slide-3.jpeg" alt="">
    <img class="home-slide" src="/images/home/church-slide-4.jpeg" alt="">
  </div>

  <div class="home-times" aria-labelledby="times-title">
    <h1 id="times-title" class="home-times__title">Horarios de Misas</h1>
    <div class="home-time-cards">
      <article class="home-time-card">
        <h2>Domingos y Festivos</h2>
        <p>11:30 y 13:00<br>20:00</p>
      </article>
      <article class="home-time-card">
        <h2>Lunes a Viernes</h2>
        <p>9:15 Mañana<br>20:00 Tarde</p>
      </article>
      <article class="home-time-card">
        <h2>Sábados</h2>
        <p>20:00<br>Misa de Jóvenes</p>
      </article>
    </div>
    <a class="home-times__button" href="/horarios/">Ver Horarios Completos →</a>
  </div>
</section>
{{ end }}
