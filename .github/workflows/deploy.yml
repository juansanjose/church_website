# .github/workflows/deploy.yml
# Build Hugo site and deploy to VPS via rsync over SSH

name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'Caddyfile'
      - '.github/workflows/deploy.yml'
      - 'Makefile'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.159.2'
          extended: true

      - name: Build site
        run: make build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: public
          path: site/public/
          retention-days: 1

  deploy:
    needs: build
    runs-on: [self-hosted, linux, church-vps]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: public
          path: public/

      - name: Deploy site
        env:
          DEPLOY_PATH: /var/www/sanpablodelacruz.com
        run: |
          set -euo pipefail
          mkdir -p "$DEPLOY_PATH"
          rm -rf "${DEPLOY_PATH}-previous"
          cp -a "$DEPLOY_PATH" "${DEPLOY_PATH}-previous"
          rsync -av --delete public/ "$DEPLOY_PATH/"

      - name: Deploy and validate Caddy configuration
        run: |
          set -euo pipefail
          install -m 0644 Caddyfile /etc/caddy/Caddyfile.new
          caddy validate --config /etc/caddy/Caddyfile.new
          mv /etc/caddy/Caddyfile.new /etc/caddy/Caddyfile
          systemctl reload caddy

      - name: Verify production site
        run: curl --fail --silent --show-error --retry 8 --retry-delay 3 --retry-all-errors https://www.sanpablodelacruz.com/ > /dev/null
